<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>どうぶつ図鑑</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f8e9;
      --card-radius: 32px;
      --bounce-duration: 0.45s;
    }

    html, body { height: 100dvh; overflow: hidden; }

    body {
      background: var(--bg);
      font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      touch-action: manipulation;
    }

    /* ===== ナビ ===== */
    nav {
      width: 100%;
      max-width: 480px;
      padding: clamp(6px, 1.5dvh, 12px) 16px 0;
      flex-shrink: 0;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: clamp(0.75rem, 3vw, 0.95rem);
      font-weight: 700;
      color: #388e3c;
      text-decoration: none;
      background: #dcedc8;
      border-radius: 20px;
      padding: 5px 14px 5px 10px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== ヘッダー ===== */
    header {
      flex-shrink: 0;
      width: 100%;
      text-align: center;
      padding: clamp(6px, 1.5dvh, 16px) 16px clamp(4px, 1dvh, 8px);
    }

    header h1 {
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: #388e3c;
      letter-spacing: 0.15em;
      text-shadow: 2px 2px 0 #dcedc8;
    }

    header p {
      font-size: clamp(0.75rem, 3vw, 1rem);
      color: #8d6e63;
      margin-top: 2px;
      letter-spacing: 0.1em;
    }

    /* ===== グリッド：2列×3行 ===== */
    main {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 480px;
      padding: clamp(6px, 1.5dvh, 12px) clamp(8px, 3vw, 16px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(6px, 1.5dvh, 14px);
    }

    /* ===== カード ===== */
    .card {
      background: #fff;
      border-radius: var(--card-radius);
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      padding: clamp(8px, 2dvh, 20px) 8px clamp(6px, 1.5dvh, 14px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1dvh, 10px);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.15s;
      overflow: hidden;
    }

    .card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.10); }

    /* ===== バウンスアニメーション ===== */
    @keyframes bounce {
      0%   { transform: scale(1) translateY(0); }
      20%  { transform: scale(0.88, 1.10) translateY(0); }
      40%  { transform: scale(1.18, 0.88) translateY(-24px); }
      55%  { transform: scale(0.94, 1.06) translateY(0); }
      70%  { transform: scale(1.08, 0.94) translateY(-10px); }
      82%  { transform: scale(0.98, 1.02) translateY(0); }
      92%  { transform: scale(1.03, 0.98) translateY(-4px); }
      100% { transform: scale(1) translateY(0); }
    }

    .emoji-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: clamp(52px, 11dvh, 84px);
      flex-shrink: 0;
      line-height: 1;
    }

    .emoji-wrap.bouncing {
      animation: bounce var(--bounce-duration) cubic-bezier(.36,.07,.19,.97) forwards;
    }

    .animal-emoji {
      font-size: clamp(2.8rem, 9dvh, 5rem);
      display: block;
    }

    .label {
      font-size: clamp(0.95rem, 4.5vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    /* ===== カードカラー ===== */
    .card[data-animal="inu"]   { background: #fff8e1; }
    .card[data-animal="inu"] .label   { color: #e65100; }

    .card[data-animal="neko"]  { background: #fce4ec; }
    .card[data-animal="neko"] .label  { color: #ad1457; }

    .card[data-animal="ushi"]  { background: #f3e5f5; }
    .card[data-animal="ushi"] .label  { color: #6a1b9a; }

    .card[data-animal="raion"] { background: #fff3e0; }
    .card[data-animal="raion"] .label { color: #bf360c; }

    .card[data-animal="zou"]   { background: #ede7f6; }
    .card[data-animal="zou"] .label   { color: #4527a0; }

    .card[data-animal="buta"]  { background: #fce4ec; }
    .card[data-animal="buta"] .label  { color: #c2185b; }

    footer {
      flex-shrink: 0;
      padding: clamp(4px, 1dvh, 12px) 0 clamp(6px, 1.5dvh, 16px);
      color: #bcaaa4;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">◀ かたち図鑑</a>
</nav>

<header>
  <h1>🐾 どうぶつ図鑑</h1>
  <p>たっぷして あそぼう！</p>
</header>

<main>
  <div class="card" data-animal="inu" data-sound="sounds/animals/inu.mp3">
    <div class="emoji-wrap"><span class="animal-emoji">🐕</span></div>
    <span class="label">いぬ</span>
  </div>

  <div class="card" data-animal="neko" data-sound="sounds/animals/neko.mp3">
    <div class="emoji-wrap"><span class="animal-emoji">🐈</span></div>
    <span class="label">ねこ</span>
  </div>

  <div class="card" data-animal="ushi" data-sound="sounds/animals/ushi.mp3">
    <div class="emoji-wrap"><span class="animal-emoji">🐄</span></div>
    <span class="label">うし</span>
  </div>

  <div class="card" data-animal="raion" data-sound="sounds/animals/raion.mp3">
    <div class="emoji-wrap"><span class="animal-emoji">🦁</span></div>
    <span class="label">ライオン</span>
  </div>

  <div class="card" data-animal="zou" data-sound="sounds/animals/zou.mp3">
    <div class="emoji-wrap"><span class="animal-emoji">🐘</span></div>
    <span class="label">ぞう</span>
  </div>

  <div class="card" data-animal="buta" data-sound="sounds/animals/buta.mp3">
    <div class="emoji-wrap"><span class="animal-emoji">🐷</span></div>
    <span class="label">ぶた</span>
  </div>
</main>

<footer>どうぶつ図鑑 ✦ 2さいから</footer>

<script>
  const audioCache = {};
  function getAudio(src) {
    if (!audioCache[src]) {
      const a = new Audio(src);
      a.preload = 'auto';
      audioCache[src] = a;
    }
    return audioCache[src];
  }

  // ページ読み込み時に全音声を先読み
  document.querySelectorAll('.card').forEach(card => {
    if (card.dataset.sound) getAudio(card.dataset.sound);
  });

  let isAnimating = false;
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      if (isAnimating) return;
      isAnimating = true;
      const wrap = card.querySelector('.emoji-wrap');
      wrap.classList.add('bouncing');
      const audio = getAudio(card.dataset.sound);
      audio.currentTime = 0;
      audio.play().catch(() => {});
      setTimeout(() => {
        wrap.classList.remove('bouncing');
        isAnimating = false;
      }, 450);
    });
  });

  document.addEventListener('touchstart', () => {}, { passive: true });
</script>

</body>
</html>
