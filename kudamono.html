<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>くだもの図鑑</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff8f0;
      --card-radius: 32px;
      --bounce-duration: 0.45s;
      --s: clamp(44px, 10dvh, 78px);
    }

    html, body { height: 100dvh; overflow: hidden; }

    body {
      background: var(--bg);
      font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      touch-action: manipulation;
    }

    /* ===== ナビ ===== */
    nav {
      width: 100%;
      max-width: 480px;
      padding: clamp(6px, 1.5dvh, 12px) 16px 0;
      flex-shrink: 0;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: clamp(0.75rem, 3vw, 0.95rem);
      font-weight: 700;
      color: #e65100;
      text-decoration: none;
      background: #fff3e0;
      border-radius: 20px;
      padding: 5px 14px 5px 10px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== ヘッダー ===== */
    header {
      flex-shrink: 0;
      width: 100%;
      text-align: center;
      padding: clamp(6px, 1.5dvh, 16px) 16px clamp(4px, 1dvh, 8px);
    }

    header h1 {
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: #e65100;
      letter-spacing: 0.15em;
      text-shadow: 2px 2px 0 #ffe0b2;
    }

    header p {
      font-size: clamp(0.75rem, 3vw, 1rem);
      color: #a1887f;
      margin-top: 2px;
      letter-spacing: 0.1em;
    }

    /* ===== グリッド：2列×3行（5枚＋空白1） ===== */
    main {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 480px;
      padding: clamp(6px, 1.5dvh, 12px) clamp(8px, 3vw, 16px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(6px, 1.5dvh, 14px);
    }

    /* 5枚目（すいか）を中央に */
    .card:last-child {
      grid-column: 1 / -1;
      max-width: calc(50% - clamp(3px, 0.75dvh, 7px));
      margin: 0 auto;
      width: 100%;
    }

    /* ===== カード ===== */
    .card {
      background: #fff;
      border-radius: var(--card-radius);
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      padding: clamp(8px, 2dvh, 22px) 8px clamp(6px, 1.5dvh, 16px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1dvh, 12px);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.15s;
      overflow: hidden;
    }

    .card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.10); }

    /* ===== バウンスアニメーション ===== */
    @keyframes bounce {
      0%   { transform: scale(1) translateY(0); }
      20%  { transform: scale(0.88, 1.10) translateY(0); }
      40%  { transform: scale(1.18, 0.88) translateY(-28px); }
      55%  { transform: scale(0.94, 1.06) translateY(0); }
      70%  { transform: scale(1.08, 0.94) translateY(-12px); }
      82%  { transform: scale(0.98, 1.02) translateY(0); }
      92%  { transform: scale(1.03, 0.98) translateY(-5px); }
      100% { transform: scale(1) translateY(0); }
    }

    .shape-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: clamp(52px, 12dvh, 90px);
      flex-shrink: 0;
    }

    .shape-wrap.bouncing {
      animation: bounce var(--bounce-duration) cubic-bezier(.36,.07,.19,.97) forwards;
    }

    .shape-wrap img {
      height: 100%;
      width: auto;
      object-fit: contain;
    }

    .label {
      font-size: clamp(0.95rem, 4.5vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    /* ===== カードカラー ===== */
    .card[data-fruit="ringo"]  { background: #fff5f5; }
    .card[data-fruit="ringo"] .label  { color: #c62828; }

    .card[data-fruit="banana"] { background: #fffde7; }
    .card[data-fruit="banana"] .label { color: #f57f17; }

    .card[data-fruit="ichigo"] { background: #fce4ec; }
    .card[data-fruit="ichigo"] .label { color: #ad1457; }

    .card[data-fruit="budo"]   { background: #f3e5f5; }
    .card[data-fruit="budo"] .label   { color: #6a1b9a; }

    .card[data-fruit="suika"]  { background: #e8f5e9; }
    .card[data-fruit="suika"] .label  { color: #2e7d32; }

    footer {
      flex-shrink: 0;
      padding: clamp(4px, 1dvh, 12px) 0 clamp(6px, 1.5dvh, 16px);
      color: #bcaaa4;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">◀ かたち図鑑</a>
</nav>

<header>
  <h1>🍎 くだもの図鑑</h1>
  <p>たっぷして あそぼう！</p>
</header>

<main>
  <div class="card" data-fruit="ringo" data-sound="sounds/ringo.mp3">
    <div class="shape-wrap"><img src="images/fruits/ringo.png" alt="りんご"></div>
    <span class="label">りんご</span>
  </div>

  <div class="card" data-fruit="banana" data-sound="sounds/banana.mp3">
    <div class="shape-wrap"><img src="images/fruits/banana.png" alt="バナナ"></div>
    <span class="label">バナナ</span>
  </div>

  <div class="card" data-fruit="ichigo" data-sound="sounds/ichigo.mp3">
    <div class="shape-wrap"><img src="images/fruits/ichigo_transparent.png" alt="いちご"></div>
    <span class="label">いちご</span>
  </div>

  <div class="card" data-fruit="budo" data-sound="sounds/budo.mp3">
    <div class="shape-wrap"><img src="images/fruits/budo.png" alt="ぶどう"></div>
    <span class="label">ぶどう</span>
  </div>

  <div class="card" data-fruit="suika" data-sound="sounds/suika.mp3">
    <div class="shape-wrap"><img src="images/fruits/suika.png" alt="すいか"></div>
    <span class="label">すいか</span>
  </div>
</main>

<footer>くだもの図鑑 ✦ 2さいから</footer>

<script>
  const audioCache = {};
  function getAudio(src) {
    if (!audioCache[src]) {
      const a = new Audio(src);
      a.preload = 'auto';
      audioCache[src] = a;
    }
    return audioCache[src];
  }

  // ページ読み込み時に全音声を先読み
  document.querySelectorAll('.card').forEach(card => {
    if (card.dataset.sound) getAudio(card.dataset.sound);
  });

  let isAnimating = false;
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      if (isAnimating) return;
      isAnimating = true;
      const wrap = card.querySelector('.shape-wrap');
      wrap.classList.add('bouncing');
      const audio = getAudio(card.dataset.sound);
      audio.currentTime = 0;
      audio.play().catch(() => {});
      setTimeout(() => {
        wrap.classList.remove('bouncing');
        isAnimating = false;
      }, 450);
    });
  });

  document.addEventListener('touchstart', () => {}, { passive: true });
</script>

</body>
</html>
